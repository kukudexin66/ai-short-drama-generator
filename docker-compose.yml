version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ai-drama-postgres
    environment:
      POSTGRES_DB: ai_drama
      POSTGRES_USER: drama_user
      POSTGRES_PASSWORD: drama_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-drama-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drama_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: ai-drama-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-drama-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-drama-backend
    environment:
      DATABASE_URL: postgresql://drama_user:drama_password@postgres:5432/ai_drama
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      JWT_SECRET: your-secret-key-change-in-production
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - ai-drama-network
    command: npm run dev

  # 前端应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-drama-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ai-drama-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  ai-drama-network:
    driver: bridge
